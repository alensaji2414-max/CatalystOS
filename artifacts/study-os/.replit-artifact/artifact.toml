kind = "web"
previewPath = "/"
title = "StudyOS"
version = "1.0.0"
id = "artifacts/study-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20889

[services.development]
run = "pnpm --filter @workspace/study-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/study-os", "run", "build" ]
publicDir = "artifacts/study-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20889"
BASE_PATH = "/"
